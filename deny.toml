[graph]
targets = []

[advisories]
ignore = [
    # Pre-existing: `instant` is unmaintained (transitive dep via lapin)
    "RUSTSEC-2024-0384",
    # Pre-existing: rustls-pemfile is unmaintained (will be resolved when lapin updates)
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
]
exceptions = [
    { allow = ["ISC", "MIT", "OpenSSL"], crate = "ring" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
