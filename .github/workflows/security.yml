name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC

permissions:
  issues: write

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install audit tools
        run: cargo install cargo-audit cargo-deny

      - name: cargo audit
        run: cargo audit

      - name: cargo deny
        run: cargo deny check

      - name: Create issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: dependency vulnerability detected',
              body: `The weekly security audit found vulnerabilities in dependencies.\n\nSee the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nRun \`cargo audit\` and \`cargo deny check\` locally to investigate.`,
              labels: ['security'],
            });
